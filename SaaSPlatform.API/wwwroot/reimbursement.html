<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reimbursement Module</title>

<link rel="stylesheet" href="dashboard.css">

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:20px;
}

h1{
    color:#333;
}

h3{
    margin-top:30px;
}

#reimFormSection{
    background:white;
    padding:20px;
    border-radius:8px;
    margin-bottom:30px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

form label{
    display:block;
    margin-top:10px;
    font-weight:bold;
}

form input{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

form button{
    background:#007BFF;
    color:white;
    padding:10px 15px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

form button:hover{
    background:#0056b3;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #eee;
}

th{
    background:#007BFF;
    color:white;
}

tr:hover{
    background:#f1f1f1;
}

.btn-approve{
    background:green;
    color:white;
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.btn-reject{
    background:red;
    color:white;
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

</style>

</head>

<body>

<h1>Reimbursement Dashboard</h1>

<!-- ========================= -->
<!-- EMPLOYEE FORM -->
<!-- ========================= -->

<div id="reimFormSection" style="display:none;">

<h3>Submit Reimbursement</h3>

<form id="reimForm">

<label>Amount</label>
<input type="number" id="reimAmount" placeholder="Enter amount" required>

<label>Description</label>
<input type="text" id="reimDescription" placeholder="Enter description" required>

<button type="submit">Submit Reimbursement</button>

</form>

</div>


<!-- ========================= -->
<!-- REIMBURSEMENT TABLE -->
<!-- ========================= -->

<h3>Reimbursement Records</h3>

<table id="reimTable">

<thead>

<tr>
<th>Employee</th>
<th>Amount</th>
<th>Description</th>
<th>Status</th>
<th>Date</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

<!-- Filled by JS -->

</tbody>

</table>


<script src="reimbursement.js"></script>

</body>
</html>
