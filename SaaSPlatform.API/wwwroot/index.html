<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
font-family: Arial, sans-serif;
background-color:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
width:320px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:20px;
}

input, select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

button{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h2>Leave Management System</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<select id="role">
<option value="Employee">Employee</option>
<option value="Admin">Admin</option>
</select>

<button onclick="login()">Login</button>

</div>

<script src="script.js"></script>

</body>
</html>
