```html
<!DOCTYPE html>
<html>
<head>
<title>Employee Dashboard</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f6f9;
}

.header{
background:#007bff;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
width:90%;
max-width:900px;
margin:30px auto;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
margin-bottom:25px;
}

h2,h3{
margin-top:0;
}

input, select{
padding:10px;
margin:8px 5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 15px;
border:none;
border-radius:5px;
background:#007bff;
color:white;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.logout-btn{
background:#dc3545;
}

.logout-btn:hover{
background:#b02a37;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

th{
background:#f2f2f2;
}

</style>

</head>

<body>

<div class="header">
<h2>Employee Dashboard</h2>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- APPLY LEAVE -->

<div class="card">

<h3>Apply Leave</h3>

<select id="leaveType">
<option value="Sick Leave">Sick Leave</option>
<option value="Casual Leave">Casual Leave</option>
<option value="Paid Leave">Paid Leave</option>
<option value="Work From Home">Work From Home</option>
</select>

<input id="leaveStart" type="date">
<input id="leaveEnd" type="date">
<input id="leaveReason" placeholder="Reason">

<button onclick="applyLeave()">Apply</button>

</div>


<!-- MY LEAVES HISTORY -->

<div class="card">

<h3>My Leaves</h3>

<table>

<thead>
<tr>
<th>Leave Type</th>
<th>Start</th>
<th>End</th>
<th>Reason</th>
<th>Status</th>
</tr>
</thead>

<tbody id="myLeavesBody"></tbody>

</table>

</div>


<!-- PENDING LEAVES -->

<div class="card">

<h3>My Pending Leaves</h3>

<table>

<thead>
<tr>
<th>Leave Type</th>
<th>Start</th>
<th>End</th>
<th>Reason</th>
<th>Status</th>
</tr>
</thead>

<tbody id="pendingLeavesBody"></tbody>

</table>

</div>

</div>

<script src="script.js"></script>

<script>

fetchMyLeaves();
fetchMyPendingLeaves();

</script>

</body>
</html>
