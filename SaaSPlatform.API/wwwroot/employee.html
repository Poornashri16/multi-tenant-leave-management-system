<!DOCTYPE html>
<html>
<head>
<title>Employee Dashboard</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f6f9;
}

.header{
background:#007bff;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
width:90%;
max-width:900px;
margin:30px auto;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
margin-bottom:25px;
}

h2,h3{
margin-top:0;
}

input, select{
padding:10px;
margin:8px 5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 15px;
border:none;
border-radius:5px;
background:#007bff;
color:white;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.logout-btn{
background:#dc3545;
}

.logout-btn:hover{
background:#b02a37;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

th{
background:#f2f2f2;
}

</style>

</head>

<body>

<div class="header">
<h2>Employee Dashboard</h2>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- PROFILE SECTION -->

<div class="card" id="profile-card">
<h2>My Profile</h2>
<div id="profile-section">
    <p>Name: <span id="profile-name"></span></p>
    <p>Email: <span id="profile-email"></span></p>
    <p>Phone: <span id="profile-phone"></span></p>
    <p>Department: <span id="profile-department"></span></p>
    <p>Date of Joining: <span id="profile-doj"></span></p>
    <button onclick="editProfile()">Edit Profile</button>
</div>

<div id="edit-profile-section" style="display:none;">
    <input id="edit-name" placeholder="Name" />
    <input id="edit-phone" placeholder="Phone" />
    <input id="edit-department" placeholder="Department" />
    <button onclick="saveProfile()">Save</button>
</div>
</div>

<!-- APPLY LEAVE -->

<div class="card">

<h3>Apply Leave</h3>

<select id="leaveType">
<option value="Sick Leave">Sick Leave</option>
<option value="Casual Leave">Casual Leave</option>
<option value="Paid Leave">Paid Leave</option>
<option value="Work From Home">Work From Home</option>
</select>

<input id="leaveStart" type="date">
<input id="leaveEnd" type="date">
<input id="leaveReason" placeholder="Reason">

<button onclick="applyLeave()">Apply</button>

</div>

<!-- MY LEAVES HISTORY -->

<div class="card">

<h3>My Leaves</h3>

<table>

<thead>
<tr>
<th>Leave Type</th>
<th>Start</th>
<th>End</th>
<th>Reason</th>
<th>Status</th>
</tr>
</thead>

<tbody id="myLeavesBody"></tbody>

</table>

</div>

<!-- PENDING LEAVES -->

<div class="card">

<h3>My Pending Leaves</h3>

<table>

<thead>
<tr>
<th>Leave Type</th>
<th>Start</th>
<th>End</th>
<th>Reason</th>
<th>Status</th>
</tr>
</thead>

<tbody id="pendingLeavesBody"></tbody>

</table>

</div>

</div>

<script src="script.js"></script>

<script>
// --- PROFILE MODULE ---
async function loadProfile() {
    const token = localStorage.getItem("token");
    const res = await fetch(`${API}/profile/me`, {
        headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    document.getElementById("profile-name").textContent = data.name;
    document.getElementById("profile-email").textContent = data.email;
    document.getElementById("profile-phone").textContent = data.phoneNumber;
    document.getElementById("profile-department").textContent = data.department;
    document.getElementById("profile-doj").textContent = new Date(data.dateOfJoining).toLocaleDateString();
}

function editProfile() {
    document.getElementById("edit-profile-section").style.display = "block";
    document.getElementById("edit-name").value = document.getElementById("profile-name").textContent;
    document.getElementById("edit-phone").value = document.getElementById("profile-phone").textContent;
    document.getElementById("edit-department").value = document.getElementById("profile-department").textContent;
}

async function saveProfile() {
    const token = localStorage.getItem("token");
    const dto = {
        Name: document.getElementById("edit-name").value,
        PhoneNumber: document.getElementById("edit-phone").value,
        Department: document.getElementById("edit-department").value
    };
    await fetch(`${API}/profile/me`, {
        method: "PUT",
        headers: { 
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
        },
        body: JSON.stringify(dto)
    });
    document.getElementById("edit-profile-section").style.display = "none";
    loadProfile();
}

// --- LOAD INITIAL DATA ---
loadProfile();
fetchMyLeaves();
fetchMyPendingLeaves();

</script>

</body>
</html>
